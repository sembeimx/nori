[tool.ruff]
line-length = 120
target-version = "py310"
extend-exclude = [
    "rootsystem/.framework_backups",
    "rootsystem/application/migrations",
    "site",
    ".venv",
    "venv",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes (unused imports, undefined names)
    "I",     # isort (import sorting)
    "UP",    # pyupgrade (modernize syntax to target-version)
    "B",     # flake8-bugbear (likely bugs)
    "S",     # flake8-bandit (security)
    "C90",   # mccabe cyclomatic complexity
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[tool.ruff.lint.mccabe]
# Default is 10. A function with complexity > 10 typically benefits from
# refactoring; per-file-ignores below document the legitimate exceptions
# (CLI dispatchers, DI decorator factories, validation rule dispatchers).
max-complexity = 10

[tool.ruff.lint.per-file-ignores]
# Re-exports from submodules are intentional in package __init__.py files.
"__init__.py" = ["F401"]
# Bootstrap hook MUST run before framework/third-party imports so observability
# SDKs (Sentry, OTel, Datadog) can patch instrumentable libraries at load time.
"rootsystem/application/asgi.py" = ["E402"]
# warnings.filterwarnings must precede framework imports — suppresses the
# Tortoise "Module 'X' has no models" RuntimeWarning fired during registration.
"rootsystem/application/core/__init__.py" = ["E402"]
# load_dotenv() must run before any module that reads env vars at import time.
"rootsystem/application/settings.py" = ["E402"]
# Tests legitimately use pytest's `assert` (S101), declare hardcoded credentials
# and URLs in fixtures (S105, S106), reference /tmp paths in mocks (S108), and
# use random for non-crypto purposes (S311). E402 covers sys.path/env/importlib
# patches before the module-under-test import.
"tests/**/*.py" = ["E402", "S101", "S105", "S106", "S108", "S311"]
# core/testing.py provides pytest-style assertion helpers (assert_redirects,
# assert_json_error) for user tests. The asserts are the point of the module.
"rootsystem/application/core/testing.py" = ["S101"]
# Recursive CTE queries in NoriTreeMixin construct identifiers via multi-line
# f-strings but validate them via isalnum() (see lines ~81 and ~109) before
# the query runs. Ruff cannot follow validation through multi-line concatenation,
# and noqa on a single line of a multi-line f-string does not always suppress.
"rootsystem/application/core/mixins/tree.py" = ["S608"]
# Installer trusts URLs constructed from the hardcoded GitHub repo (S310) and
# invokes git from PATH (S607). Acceptable for a one-shot install script.
"docs/install.py" = ["S310", "S603", "S607"]
# core/cli.py spawns subprocesses (uvicorn, aerich, python -c scripts) with
# hardcoded executables and args — never user input. S603 flags every
# subprocess.run regardless of input source. S310 covers the framework:update
# downloader (URL constructed from the hardcoded GITHUB_REPO). C901 covers
# main() (argparse dispatcher, complexity 19) and framework_update() (full
# update workflow: download, verify, apply, backup, cleanup — complexity 28).
"rootsystem/application/core/cli.py" = ["S603", "S310", "C901"]
# core/http/validation.py: validate() iterates rules-of-rules (complexity 11);
# _check_rule() is a declarative rule dispatcher with one branch per rule
# keyword (complexity 51). Ideally a dispatch dict, but the current shape
# mirrors the user-facing rule grammar (`min:5|email|in:a,b`).
"rootsystem/application/core/http/validation.py" = ["C901"]
# core/auth/csrf.py: __call__ is the middleware entry — branches by scope
# type, HTTP method, exempt-path match, header vs body token, and method.
"rootsystem/application/core/auth/csrf.py" = ["C901"]
# core/http/inject.py: 3-layer DI decorator factory (inject → decorator →
# wrapper). Each layer's complexity comes from supporting many injectable
# parameter shapes (request, form, json, query, path); flattening duplicates.
"rootsystem/application/core/http/inject.py" = ["C901"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"

[tool.mypy]
python_version = "3.10"
files = ["rootsystem/application"]
exclude = [
    "rootsystem/application/migrations",
    "rootsystem/.framework_backups",
]
# Most third-party libs (tortoise, starlette, jinja2, etc.) ship without
# type stubs or with incomplete ones. Treat missing imports as Any rather
# than failing the type check.
ignore_missing_imports = true
# Show error codes so they can be silenced precisely with # type: ignore[code].
show_error_codes = true
# Flag # type: ignore comments that are no longer needed — keeps the
# baseline honest as upstream stubs improve.
warn_unused_ignores = true
pretty = true

# Per-module strict typing for high-stakes surfaces.
# The framework as a whole runs in gradual mode (default mypy) — strict mode is
# applied selectively to modules where a type bug has security or correctness
# consequences: auth (login/CSRF/JWT/OAuth) and validation (the input gate).
# Adding a new strict module: bump these globs, run `mypy`, fix the new errors
# the same release. Do NOT make the global default strict — most of `core/` is
# correctly typed in gradual mode and converting wholesale would generate noise
# without finding bugs.
[[tool.mypy.overrides]]
module = [
    "core.auth.security",
    "core.auth.login_guard",
    "core.auth.csrf",
    "core.auth.jwt",
    "core.auth.oauth",
    "core.http.validation",
]
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_return_any = true

[tool.interrogate]
# Docstring coverage gate. Floor is intentionally a few points below current
# baseline to absorb churn; raise as the project sustains a higher number.
# Module docstrings are NOT exempt — the v1.10.7 incident showed module-level
# docstrings can disappear silently when `from __future__ import annotations`
# is placed before them, and only checked tooling catches the regression.
fail-under = 70
exclude = [
    "rootsystem/.framework_backups",
    "rootsystem/application/migrations",
    "site",
    ".venv",
    "venv",
    "tests",
]
ignore-init-module = true       # __init__.py files are typically re-export shims
ignore-init-method = true       # constructors are described by their class
ignore-magic = true             # __call__, __eq__, etc. — name documents the contract
ignore-property-decorators = true
ignore-nested-functions = true
# Tortoise's `class Meta:` is a configuration sentinel — no docstring is
# expected by convention. Same shape as Django's Meta.
ignore-regex = ["^Meta$"]
verbose = 1
omit-covered-files = false

[tool.coverage.run]
source = ["rootsystem/application"]
branch = true
omit = [
    # Aerich-generated files; engine-specific SQL, not framework logic.
    "rootsystem/application/migrations/*",
    # Template files shipped to user projects — they are meant to be edited,
    # not exercised by framework tests.
    "rootsystem/application/seeders/example_seeder.py",
    "rootsystem/application/commands/_example.py",
]

[tool.coverage.report]
fail_under = 75
show_missing = true
skip_covered = false
precision = 1
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
    # Defensive guards in CLI subprocess scripts that only run in error paths.
    "raise AssertionError",
]
