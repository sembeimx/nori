name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
      - run: pip install pip-audit

      # Each --ignore-vuln below has a documented justification. Removing an
      # ignore SHOULD fail the build — that's the whole point. New CVEs not
      # in this list will still break CI, which is why this workflow has
      # value despite the existing exceptions.
      - name: Audit framework dependencies (requirements.nori.txt)
        run: |
          pip-audit -r requirements.nori.txt \
            --ignore-vuln GHSA-qhqw-rrw9-25rm

      - name: Audit dev dependencies (requirements-dev.txt)
        run: |
          pip-audit -r requirements-dev.txt \
            --ignore-vuln GHSA-qhqw-rrw9-25rm \
            --ignore-vuln PYSEC-2022-42969

# Documented exceptions (keep in sync with the --ignore-vuln flags above).
# Both are permanent — neither has an upstream fix and neither vulnerability
# vector applies to Nori's actual usage.
#
# GHSA-qhqw-rrw9-25rm  asyncmy 0.2.11 — SQL injection via crafted dict keys
#                      (CVE-2025-65896). NO upstream fix available. Vector
#                      applies only to raw queries that pass user-controlled
#                      dict keys to asyncmy.execute(). Tortoise ORM (Nori's
#                      only DB layer) and core/ never do this. Revisit on
#                      each release; reconsider migrating to aiomysql if
#                      upstream stays unpatched.
#
# PYSEC-2022-42969     py 1.11.0 (CVE-2022-42969) — ReDoS in py.path.svnurl
#                      .info via crafted Subversion repository data. The
#                      `py` package is essentially abandoned (last release
#                      2022) so no fix will ship. Vector requires invoking
#                      SVN parsing on attacker-controlled data — neither
#                      Nori nor pytest does this; py is a transitive dep.
