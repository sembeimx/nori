name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Use the gitleaks binary directly (not the GitHub Action wrapper) to avoid the
# org-account licensing requirement of gitleaks-action v2. The binary itself is
# permissively licensed.
jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so historical commits get scanned too

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /tmp gitleaks
          /tmp/gitleaks version

      - name: Run gitleaks (full history)
        run: |
          /tmp/gitleaks detect \
            --source=. \
            --no-banner \
            --redact \
            --verbose
